<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantix</title>
    <link rel="stylesheet" href="./css/style.css">
    <script src="./js/app.js"></script>
</head>
<body>
    <h1>Semantix: A Semantic Search Tool for your Documentation</h1>
    <div id="upload-container">
        <input text="Upload a file" type="file" id="file-input" accept=".pdf, .docx, .txt, .md">
        <button id="upload-button">Upload</button>
    </div>
    <div id="search-container">
        <input text="Search for a term" type="text" id="search-input" placeholder="Search for a term">
            <button id="search-button">Search</button>
        </div>
        <div id="results-container">
            <div id="results"></div>
        </div>
    </div>
</body>
</html>
